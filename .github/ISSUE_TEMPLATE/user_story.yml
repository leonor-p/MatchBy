name: "User Story"
description: "Template for drafting user stories, including acceptance criteria and completion requirements"
title: "S-<NNN>: <short summary here>"
labels: ["feature", "user-story"]
assignees: []

body:
  - type: input
    id: story_id
    attributes:
      label: "Story ID"
      description: "Enter the unique story identifier (e.g., 001, 102, 245)."
      placeholder: "e.g., 123"

  - type: input
    id: story_points
    attributes:
      label: "Story Points"
      description: "Estimate the effort required to complete this story."
      placeholder: "e.g., 1-5"

  - type: textarea
    id: user_story
    attributes:
      label: "User Story"
      description: "Fill in the fields (User Type, Goal, and Benefit) to generate your user story."
      value: |
        **As** a <UserType>,  
        **I want** <Goal>,  
        **So that** <Benefit>.


  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      description: "Define the conditions that must be satisfied for this story to be accepted (use checklist format)."
      value: |
        - [ ] Condition 1
        - [ ] Condition 2
        - [ ] Condition 3

  - type: textarea 
    id: ui_mockups 
    attributes: 
      label: "UI Mockups / Wireframes" 
      description: "Reference to mockups, wireframes or prototypes documented in the Wiki." 
      value: | 
        - [Wireframes of functionality X](/wiki/UI-Mockups#functionality-x)
        
  - type: textarea
    id: done_definition
    attributes:
      label: "Completion Definition"
      description: "Specify the items that confirm this story is finished (use checklist format)."
      value: |
        - [ ] Every acceptance criterion is fulfilled
        - [ ] Code has been reviewed and merged
        - [ ] Automated tests written and successful
        - [ ] Documentation updated as needed
        - [ ] Released to production environment

  - type: textarea
    id: notes
    attributes:
      label: "Notes / Dependencies"
      description: "Include relevant background information, dependencies, or clarifications."
