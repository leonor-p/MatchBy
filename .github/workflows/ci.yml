name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: dotnet restore MatchBy.sln

      - name: Build
        run: dotnet build MatchBy.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test MatchBy.sln --configuration Release --no-build --verbosity normal
