name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: dotnet restore MatchBy.sln

      - name: Build
        run: dotnet build MatchBy.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=false /p:CodeAnalysisTreatWarningsAsErrors=false /p:EnforceCodeStyleInBuild=false /p:AnalysisMode=None

      - name: Install Playwright browsers
        run: pwsh MatchBy.UnitTests/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Run tests
        run: dotnet test MatchBy.sln --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName!~Playwright"
