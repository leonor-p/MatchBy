name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # Job 1: Build e Publish
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Restore dependencies
        run: dotnet restore MatchBy.sln

      - name: Build
        run: dotnet build MatchBy.sln --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish MatchBy/MatchBy/MatchBy.csproj -c Release -o ${{ env.DOTNET_ROOT }}/myapp --no-build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  # Job 2: Testes e Coverage
  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Restore dependencies
        run: dotnet restore MatchBy.sln

      - name: Build
        run: dotnet build MatchBy.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test MatchBy.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage;Format=cobertura,opencover"

      - name: Collect coverage files
        run: |
          mkdir -p coverage
          find . -type f -name "coverage.cobertura.xml" -exec cp {} coverage/ \;

      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: 'coverage/**/coverage.cobertura.xml'
          badge: true
          fail_below_min: false
          format: 'markdown'
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: 'both'
          thresholds: '80 60'

      - name: Add coverage to job summary
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/test-results.trx'
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  # Job 3: SonarCloud Analysis
  sonar:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/sonar-scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/sonar-scanner"
          dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}/sonar-scanner"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Restore dependencies
        run: dotnet restore MatchBy.sln

      - name: SonarCloud - build, test and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          SCANNER="${{ runner.temp }}/sonar-scanner/dotnet-sonarscanner"

          "$SCANNER" begin \
            /k:"matchby_matchby" \
            /o:"matchby" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

          dotnet build MatchBy.sln --configuration Release --no-restore

          dotnet test MatchBy.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage;Format=cobertura,opencover"

          "$SCANNER" end /d:sonar.token="$SONAR_TOKEN"

      - name: SonarCloud summary in job summary
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: matchby_matchby
        run: |
          sudo apt-get update >/dev/null 2>&1
          sudo apt-get install -y jq >/dev/null 2>&1

          HOST="https://sonarcloud.io"
          BRANCH="${{ github.ref_name }}"

          QG_JSON=$(curl -s \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "$HOST/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY&branch=$BRANCH")

          QG_STATUS=$(echo "$QG_JSON" | jq -r '.projectStatus.status // "UNKNOWN"')

          METRICS="bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density"

          M_JSON=$(curl -s \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "$HOST/api/measures/component?component=$SONAR_PROJECT_KEY&metricKeys=$METRICS&branch=$BRANCH")

          get_metric() {
            echo "$M_JSON" | jq -r --arg m "$1" '
              .component.measures[] | select(.metric==$m) | .value
            ' 2>/dev/null || echo "n/a"
          }

          BUGS=$(get_metric bugs)
          VULN=$(get_metric vulnerabilities)
          SMELLS=$(get_metric code_smells)
          COV=$(get_metric coverage)
          DUP=$(get_metric duplicated_lines_density)

          ICON="⚪"
          if [ "$QG_STATUS" = "OK" ]; then
            ICON="✅"
          elif [ "$QG_STATUS" = "ERROR" ]; then
            ICON="❌"
          fi

          {
            echo "## SonarCloud - Quality Gate"
            echo ""
            echo "- Projeto: \`$SONAR_PROJECT_KEY\`"
            echo "- Branch: \`$BRANCH\`"
            echo "- Quality Gate: ${ICON} **$QG_STATUS**"
            echo ""
            echo "### Métricas (branch atual)"
            echo ""
            echo "| Métrica           | Valor |"
            echo "|-------------------|-------|"
            echo "| Bugs              | $BUGS |"
            echo "| Vulnerabilidades  | $VULN |"
            echo "| Code Smells       | $SMELLS |"
            echo "| Cobertura (%)     | $COV |"
            echo "| Duplicação (%)    | $DUP |"
            echo ""
            echo "[Abrir análise no SonarCloud]($HOST/project/overview?id=$SONAR_PROJECT_KEY&branch=$BRANCH)"
          } >> "$GITHUB_STEP_SUMMARY"

  # Job 4: Release no GitHub
  release:
    runs-on: ubuntu-latest
    needs: [build, test, sonar]
    permissions:
      contents: write

    steps:
      - name: Checkout (full history + tags para MinVer/GitVersion se precisares)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create GitHub Release (no assets)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
